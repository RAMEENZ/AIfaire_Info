server {
    listen 80;
    server_name _;

    # Désactive le buffering pour les Server-Sent Events (temps réel)
    proxy_buffering off;

    # ── Durcissement ─────────────────────────────────────────────────────────
    # Masque la version nginx et l'en-tête X-Powered-By (fuite de stack).
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # En-têtes de sécurité (TLS terminé chez Cloudflare, propagés au client).
    # NB : pas de Content-Security-Policy stricte ici — elle casserait le
    # chargement des tuiles Leaflet et les styles inline de Next.js. À ajouter
    # séparément après test (voir security/cloudflare-setup.md).
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000"               always;

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE : pas de timeout agressif
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # NB : /docs, /redoc et /openapi.json ne sont volontairement plus routés ici.
    # La doc interactive est désactivée côté FastAPI (ENABLE_DOCS=false) afin de
    # ne pas exposer publiquement la surface de l'API. Ces chemins retombent sur
    # le frontend (404) ci-dessous.

    # Frontend Next.js (tout le reste)
    location / {
        proxy_pass             http://frontend:3000/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js dev HMR + future ws)
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_read_timeout     600s;
    }
}
