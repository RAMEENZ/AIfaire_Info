# Configuration Alembic — migrations de schéma versionnées.
#
# L'URL de base n'est PAS définie ici : env.py la lit depuis la configuration
# de l'application (app.config.settings.DATABASE_URL, donc .env / variables
# d'environnement), comme le reste du backend.
#
# Usage (depuis backend/, ou dans le conteneur : docker compose exec backend …) :
#   alembic stamp head                     # DB existante : marquer la baseline
#   alembic upgrade head                   # appliquer les migrations
#   alembic revision -m "ma modification"  # créer une nouvelle migration
[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
