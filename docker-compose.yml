services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: faire_info
      POSTGRES_USER: faire_info
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faire_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://faire_info:${POSTGRES_PASSWORD:-password}@db:5432/faire_info
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      METEO_FRANCE_API_KEY: ${METEO_FRANCE_API_KEY:-}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      FETCH_FULL_ARTICLES: ${FETCH_FULL_ARTICLES:-true}
      MAX_PRESSE_ARTICLES: ${MAX_PRESSE_ARTICLES:-120}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_THRESHOLD: ${WEBHOOK_THRESHOLD:-3}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL relative → nginx route /api/ vers le backend (fonctionne en local ET via tunnel)
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - nginx

volumes:
  pgdata:
