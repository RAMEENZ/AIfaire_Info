# Rotation des logs : sans borne, le driver json-file grossit indéfiniment et
# finit par remplir le disque (le backend logge à chaque ingestion). 3 fichiers
# de 10 Mo max par conteneur. Prend effet à la recréation du conteneur.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    logging: *default-logging
    image: postgis/postgis:16-3.4
    # Seul service qui n'avait PAS de politique de redémarrage (défaut: no) :
    # au redémarrage du démon Docker (MAJ automatiques…), tout revenait sauf la
    # base → backend en crash-loop, site down. Incident du 02/07/2026.
    restart: unless-stopped
    environment:
      POSTGRES_DB: faire_info
      POSTGRES_USER: faire_info
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definis POSTGRES_PASSWORD (mot de passe DB fort) dans .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faire_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    logging: *default-logging
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    logging: *default-logging
    build: ./backend
    # Bind sur localhost uniquement : le backend n'est PAS exposé sur Internet.
    # cloudflared et nginx le joignent par le réseau Docker interne (backend:8000).
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://faire_info:${POSTGRES_PASSWORD:?Definis POSTGRES_PASSWORD dans .env}@db:5432/faire_info
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      METEO_FRANCE_API_KEY: ${METEO_FRANCE_API_KEY:-}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      FETCH_FULL_ARTICLES: ${FETCH_FULL_ARTICLES:-true}
      MAX_PRESSE_ARTICLES: ${MAX_PRESSE_ARTICLES:-120}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: INFO
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_THRESHOLD: ${WEBHOOK_THRESHOLD:-3}
      # Commit déployé (facultatif) : docker compose … avec GIT_SHA=$(git rev-parse --short HEAD)
      GIT_SHA: ${GIT_SHA:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    logging: *default-logging
    build:
      context: ./frontend
      args:
        # URL relative → nginx route /api/ vers le backend (fonctionne en local ET via tunnel)
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    # Bind sur localhost uniquement : le front passe par nginx (réseau interne),
    # jamais en direct depuis Internet. Ferme l'accès brut http://IP:3000.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    logging: *default-logging
    image: nginx:alpine
    # cloudflared joint nginx via le réseau interne Docker (nginx:80), pas par ce
    # port hôte. Bind sur localhost : le mapping ne sert qu'aux tests locaux
    # (curl http://localhost:8088/) et n'expose rien sur Internet.
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  cloudflared:
    logging: *default-logging
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared/config.yml:/home/nonroot/.cloudflared/config.yml:ro
    command: --config /home/nonroot/.cloudflared/config.yml tunnel --no-autoupdate run
    depends_on:
      - nginx

volumes:
  pgdata:
