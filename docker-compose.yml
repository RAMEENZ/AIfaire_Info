services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: faire_info
      POSTGRES_USER: faire_info
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faire_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # Healthy dès que le serveur répond — le téléchargement du modèle est géré
      # par ollama-init en arrière-plan (sinon deadlock : le backend attendrait
      # un modèle qui ne peut se télécharger qu'après démarrage).
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: >
      sh -c "
        echo \"[ollama-init] Attente du serveur Ollama...\"
        until ollama list > /dev/null 2>&1; do sleep 3; done
        echo \"[ollama-init] Téléchargement de ${OLLAMA_MODEL:-qwen2.5:1.5b}...\"
        ollama pull ${OLLAMA_MODEL:-qwen2.5:1.5b}
        echo \"[ollama-init] Modèle prêt.\"
      "
    depends_on:
      - ollama
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://faire_info:${POSTGRES_PASSWORD:-password}@db:5432/faire_info
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      METEO_FRANCE_API_KEY: ${METEO_FRANCE_API_KEY:-}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      FETCH_FULL_ARTICLES: ${FETCH_FULL_ARTICLES:-false}
      MAX_PRESSE_ARTICLES: ${MAX_PRESSE_ARTICLES:-120}
      APP_ENV: production
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
